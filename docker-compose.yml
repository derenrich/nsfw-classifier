version: '3.8'

services:
  nsfw-classifier:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - HF_TOKEN
    container_name: nsfw-classifier-server
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      # Exposes all GPU devices to the container
      - NVIDIA_VISIBLE_DEVICES=all
      # Forces stdout and stderr to be unbuffered
      - PYTHONUNBUFFERED=1
      # Configures the port uvicorn runs on inside the container
      - PORT=${PORT:-8000}
      # Configures path translation from host machine to container's /datasets volume
      - HOST_DATASET_PATH=${HOST_DATASET_PATH:-/home/user/my_datasets}
      - CONTAINER_DATASET_PATH=/datasets
      # SQLite score cache (set to empty string to disable)
      - SCORE_CACHE_DB=${SCORE_CACHE_DB:-/app/cache/scores.db}
    volumes:
      # Maps the host's dataset directory to the container path /datasets
      # Using interpolation ${HOST_DATASET_PATH} with fallback so it can be set in an .env file
      - ${HOST_DATASET_PATH:-/home/user/my_datasets}:/datasets
      # Persistent volume for the score cache database
      - nsfw-cache:/app/cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  nsfw-cache:

secrets:
  HF_TOKEN:
    environment: HF_TOKEN
